model:
  model_variant: lorentz_2eq
  num_classes: 10
  embed_dim: 128
  num_heads: 8
  num_layers: 8
  num_cls_layers: 2
  num_mlp_layers: 0
  hidden_dim: 256
  hidden_mv_channels: 8
  in_s_channels:
  out_s_channels:
  hidden_s_channels: 16
  attention: {}
  mlp: {}
  reinsert_mv_channels:
  reinsert_s_channels:
  dropout: 0.1
  expansion_factor: 4
  max_num_particles: 128
  num_particle_features: 4
  pair_embed_dims: [64, 64, 64]
  mask: false
  weights:
  inference: false

train:
  batch_size: 256
  criterion:
    name: cross_entropy_loss
    kwargs: {}
  optimizer:
    name: radam
    kwargs:
      lr: 0.0008
      weight_decay: 0.0
      betas: [0.95, 0.999]
      eps: 0.00001
  optimizer_wrapper:
    name: lookahead
    kwargs:
      la_steps: 6
      la_alpha: 0.5
  scheduler:
    name: exponential_lr
    kwargs:
      gamma: 0.90
  callbacks:
    - name: early_stopping
      kwargs:
        monitor: val_loss
        mode: min
        patience: 4
        min_delta: 0.0005
  num_epochs: 8
  start_epoch: 0
  logging_dir: results
  logging_steps: 50
  progress_bar: false
  save_best: true
  save_ckpt: true
  save_fig: false
  num_workers: 4
  pin_memory: true
